<div class="home-container" *ngIf="!carregando; else loading">

  <app-header [usuario]="usuarioNome"></app-header>

  <h2 class="titulo">Bem-vindo, {{ usuarioNome }} </h2>

  <!-- Notificações -->
  <section class="bloco">
    <h3>Notificações</h3>

    <div class="lista" *ngIf="notificacoes.length > 0; else semNotificacoes">
      <app-notificacao-card
        *ngFor="let n of notificacoes"
        [notificacao]="n">
      </app-notificacao-card>
    </div>
  </section>

  <ng-template #semNotificacoes>
    <p class="vazio">Nenhuma notificação no momento.</p>
  </ng-template>


  <!-- Agendamentos do Dia -->
  <section class="bloco">
    <h3>Agendamentos de Hoje</h3>

    <div *ngIf="agendamentosHoje.length > 0; else semAgendamentos">
      <app-relatorio-table
        [dados]="agendamentosHoje"
        titulo="Agendamentos">
      </app-relatorio-table>
    </div>
  </section>

  <ng-template #semAgendamentos>
    <p class="vazio">Nenhum agendamento para hoje.</p>
  </ng-template>


  <!-- Ambientes mais usados -->
  <section class="bloco">
    <h3>Ambientes Mais Utilizados</h3>

    <div class="ambientes-lista">
      <app-sala-card
        *ngFor="let ambiente of ambientesMaisUsados"
        [ambiente]="ambiente">
      </app-sala-card>
    </div>
  </section>

</div>

<!-- LOADING -->
<ng-template #loading>
  <div class="loading">
    <div class="spinner"></div>
    <p>Carregando dados...</p>
  </div>
</ng-template>

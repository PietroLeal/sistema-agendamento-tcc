<ion-header>
  <ion-toolbar color="primary">
    <ion-title>Perfis</ion-title>
    <ion-buttons slot="end">
      <ion-button (click)="novoPerfil()">
        <ion-icon slot="icon-only" name="add"></ion-icon>
      </ion-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">

  <!-- Lista de perfis -->
  <ion-list *ngIf="perfis.length; else nenhumPerfil">
    <ion-item *ngFor="let p of perfis; let i = index">
      <ion-label>
        <h2>{{ p.nome }}</h2>
        <p *ngIf="p.permissoes.length">Permissões: {{ p.permissoes.join(', ') }}</p>
      </ion-label>
      <ion-buttons slot="end">
        <ion-button fill="clear" (click)="editarPerfil(i)">
          <ion-icon name="create-outline"></ion-icon>
        </ion-button>
        <ion-button fill="clear" color="danger" (click)="excluirPerfil(i)">
          <ion-icon name="trash-outline"></ion-icon>
        </ion-button>
      </ion-buttons>
    </ion-item>
  </ion-list>

  <ng-template #nenhumPerfil>
    <ion-text color="medium">Nenhum perfil cadastrado.</ion-text>
  </ng-template>

  <!-- Modal para cadastro/edição de perfil -->
  <ion-modal [isOpen]="modalAberto" (didDismiss)="modalAberto=false">
    <ng-template>
      <ion-header>
        <ion-toolbar>
          <ion-title>{{ editando !== null ? 'Editar Perfil' : 'Novo Perfil' }}</ion-title>
          <ion-buttons slot="end">
            <ion-button (click)="modalAberto=false">Fechar</ion-button>
          </ion-buttons>
        </ion-toolbar>
      </ion-header>

      <ion-content class="ion-padding">

        <!-- Nome do perfil -->
        <ion-item>
          <ion-label position="stacked">Nome do Perfil</ion-label>
          <ion-input [(ngModel)]="form.nome"></ion-input>
        </ion-item>

        <!-- Permissões -->
        <ion-list>
          <ion-item *ngFor="let perm of permissoesDisponiveis">
            <ion-label>{{ perm }}</ion-label>
            <ion-checkbox slot="end" [(ngModel)]="form.permissoesObj[perm]"></ion-checkbox>
          </ion-item>
        </ion-list>

        <ion-button expand="full" class="ion-margin-top" (click)="salvarPerfil()">
          {{ editando !== null ? 'Atualizar Perfil' : 'Cadastrar Perfil' }}
        </ion-button>

      </ion-content>
    </ng-template>
  </ion-modal>

</ion-content>

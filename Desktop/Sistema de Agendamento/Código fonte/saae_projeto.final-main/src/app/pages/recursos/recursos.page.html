<ion-header>
  <ion-toolbar color="primary">
    <ion-title>Recursos</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">
  <!-- Botão Criar -->
  <ion-button expand="block" color="success" (click)="abrirModal()">
    <ion-icon slot="start" name="add-circle-outline"></ion-icon>
    Criar Novo Recurso
  </ion-button>

  <!-- Lista -->
  <ion-list *ngIf="recursos.length > 0; else vazio">
    <ion-item *ngFor="let recurso of recursos">
      <ion-label>
        <h2>{{ recurso.nome }}</h2>
        <ion-chip [color]="recurso.tipo === 'Fixo' ? 'primary' : 'tertiary'">
          {{ recurso.tipo }}
        </ion-chip>
      </ion-label>

      <!-- Botões -->
      <ion-buttons slot="end">
        <ion-button fill="clear" (click)="abrirModal(recurso)">
          <ion-icon name="create-outline"></ion-icon>
        </ion-button>
        <ion-button fill="clear" color="danger" (click)="excluirRecurso(recurso)">
          <ion-icon name="trash-outline"></ion-icon>
        </ion-button>
      </ion-buttons>
    </ion-item>
  </ion-list>

  <ng-template #vazio>
    <ion-text color="medium">
      <p class="ion-text-center">🚫 Nenhum recurso cadastrado.</p>
    </ion-text>
  </ng-template>
</ion-content>

<!-- Modal de Cadastro/Edição -->
<ion-modal [isOpen]="modalAberto" (didDismiss)="fecharModal()">
  <ng-template>
    <ion-header>
      <ion-toolbar color="primary">
        <ion-title>{{ recursoEditando ? 'Editar Recurso' : 'Novo Recurso' }}</ion-title>
        <ion-buttons slot="end">
          <ion-button (click)="fecharModal()">Fechar</ion-button>
        </ion-buttons>
      </ion-toolbar>
    </ion-header>

    <ion-content class="ion-padding">
      <ion-item>
        <ion-label position="stacked">Nome</ion-label>
        <ion-input [(ngModel)]="novoRecurso.nome" placeholder="Digite o nome"></ion-input>
      </ion-item>

      <ion-item>
        <ion-label position="stacked">Tipo</ion-label>
        <ion-select [(ngModel)]="novoRecurso.tipo" placeholder="Selecione">
          <ion-select-option value="Fixo">Fixo</ion-select-option>
          <ion-select-option value="Móvel">Móvel</ion-select-option>
        </ion-select>
      </ion-item>

      <ion-button expand="block" color="success" (click)="salvarRecurso()">
        {{ recursoEditando ? 'Salvar Alterações' : 'Salvar' }}
      </ion-button>
    </ion-content>
  </ng-template>
</ion-modal>

<ion-header translucent>
  <ion-toolbar color="primary">
    <ion-title>Agendar Horário</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding" color="light">
  <div class="intro-section">
    <h1>Selecione uma Data</h1>
    <p>Escolha uma data disponível para agendar <strong>{{ ambiente.nome }}</strong>.</p>
  </div>

  <ion-card class="date-card">
    <ion-card-content>
      <ion-datetime
        [(ngModel)]="dataSelecionada"
        presentation="date"
        color="primary"
        firstDayOfWeek="1"
        showDefaultButtons="true"
        preferWheel="false"
        class="modern-calendar"
        (ionChange)="onDataChange()">
      </ion-datetime>
    </ion-card-content>
  </ion-card>

  <!-- Horários -->
  <ion-card *ngIf="dataSelecionada" class="ion-margin-top">
    <ion-card-content>
      <h2>Selecione um horário</h2>
      <ion-grid class="horarios-grid">
        <ion-row>
          <ion-col size="6" *ngFor="let h of horarios">
            <ion-card
              [class.selected]="h === horarioSelecionado"
              [class.bloqueado]="isHorarioBloqueado(h)"
              (click)="selecionarHorario(h)">
              <ion-card-content>
                <ion-icon name="time-outline" class="time-icon"></ion-icon>
                <div>
                  <h3>{{ h.inicio }} - {{ h.fim }}</h3>
                  <p *ngIf="isHorarioBloqueado(h)" class="texto-indisponivel">Indisponível</p>
                </div>
              </ion-card-content>
            </ion-card>
          </ion-col>
        </ion-row>
      </ion-grid>
    </ion-card-content>
  </ion-card>

  <!-- Formulário -->
  <ion-card *ngIf="horarioSelecionado" class="ion-margin-top">
    <ion-card-content>
      <ion-item>
        <ion-label position="floating">Evento</ion-label>
        <ion-input [(ngModel)]="evento"></ion-input>
      </ion-item>

      <ion-item>
        <ion-label position="floating">Segmento</ion-label>
        <ion-input [(ngModel)]="segmento"></ion-input>
      </ion-item>

      <ion-item>
        <ion-label position="floating">Quantidade de Pessoas</ion-label>
        <ion-input type="number" [(ngModel)]="qtdPessoas"></ion-input>
      </ion-item>

      <ion-item>
        <ion-label>Recursos</ion-label>
        <ion-select [(ngModel)]="recursosSelecionados" multiple="true" placeholder="Selecione os recursos">
          <ion-select-option *ngFor="let r of recursos" [value]="r.id">
            {{ r.nome }} ({{ r.tipo }})
          </ion-select-option>
        </ion-select>
      </ion-item>

      <ion-button expand="block" color="primary" (click)="salvarDisponibilidade()">
        <ion-icon name="save-outline" slot="start"></ion-icon>
        Confirmar Reserva
      </ion-button>
    </ion-card-content>
  </ion-card>

  <!-- CSS dentro do HTML -->
  <style>
    .selected {
      border: 2px solid var(--ion-color-primary);
      transform: scale(1.03);
    }

    .bloqueado {
      opacity: 0.5;
      pointer-events: none;
      background-color: #f8d7da;
    }

    .texto-indisponivel {
      color: red;
      font-size: 12px;
    }

    .modern-calendar {
      width: 100%;
    }

    .time-icon {
      font-size: 20px;
      margin-right: 8px;
    }
  </style>
</ion-content>

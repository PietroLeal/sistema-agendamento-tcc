<table>
  <thead>
    <tr>
      <th>Usuário</th>
      <th>Ambiente</th>
      <th>Início</th>
      <th>Fim</th>
    </tr>
  </thead>

  <tbody>
    <tr *ngFor="let item of dados">
      <td>{{ item.usuario }}</td>
      <td>{{ item.ambiente }}</td>
      <td>{{ item.inicio | date:'short' }}</td>
      <td>{{ item.fim | date:'short' }}</td>
    </tr>
  </tbody>
</table>

<form [formGroup]="form" (ngSubmit)="submit()">
  <label>Usuário:</label>
  <input formControlName="usuario_id" type="number">

  <label>Ambiente:</label>
  <input formControlName="ambiente_id" type="number">

  <label>Início:</label>
  <input formControlName="inicio" type="datetime-local">

  <label>Fim:</label>
  <input formControlName="fim" type="datetime-local">

  <label>Descrição:</label>
  <textarea formControlName="descricao"></textarea>

  <button type="submit">Salvar</button>
</form>

<ion-header>
  <ion-toolbar>
    <ion-buttons slot="start">
      <ion-back-button defaultHref="/login"></ion-back-button>
    </ion-buttons>
    <ion-title>Esqueci minha senha</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="forgot-bg">
  <div class="forgot-container">
    <div class="forgot-card">
      <div class="icon-container">
        <ion-icon name="mail-outline" class="icon-large"></ion-icon>
      </div>
      
      <h2>Redefinir senha</h2>
      <p class="description">
        Informe seu e-mail cadastrado e enviaremos um link para criar uma nova senha.
      </p>

      <ion-item lines="none" class="input-item">
        <ion-icon name="mail-outline" slot="start"></ion-icon>
        <ion-input
          type="email"
          [(ngModel)]="email"
          placeholder="seu@email.com"
          clearInput>
        </ion-input>
      </ion-item>

      <ion-button 
        expand="block" 
        (click)="requestReset()"
        [disabled]="!email || loading"
        class="btn-reset">
        <ion-spinner name="crescent" *ngIf="loading"></ion-spinner>
        <span *ngIf="!loading">Enviar link de redefinição</span>
      </ion-button>

      <div *ngIf="successMessage" class="message success">
        <ion-icon name="checkmark-circle-outline"></ion-icon>
        <p>{{ successMessage }}</p>
      </div>

      <div *ngIf="errorMessage" class="message error">
        <ion-icon name="alert-circle-outline"></ion-icon>
        <p>{{ errorMessage }}</p>
      </div>

      <div class="back-to-login">
        <ion-button fill="clear" (click)="goToLogin()" class="back-btn">
          <ion-icon name="arrow-back-outline" slot="start"></ion-icon>
          Voltar para o login
        </ion-button>
      </div>
    </div>
  </div>
</ion-content>
